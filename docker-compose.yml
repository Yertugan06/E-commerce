services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ecommerce
      SECRET_KEY: change-me-to-a-random-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - backend

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - nginx

  locust:
    build: ./loadtesting
    restart: "no"
    ports:
      - "8089:8089"
    environment:
      LOCUST_HOST: http://nginx:80
      PRODUCT_IDS: "101,102,103,104,105"
    command:
      - "--autostart"
      - "--autoquit"
      - "60"
      - "-u"
      - "50"
      - "-r"
      - "10"
      - "--run-time"
      - "10m"
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  autoscaler:
    build: ./autoscaler
    restart: unless-stopped
    environment:
      AUTOSCALER_PROMETHEUS_URL: http://prometheus:9090
      AUTOSCALER_COMPOSE_PROJECT: e-commerce
      AUTOSCALER_SERVICE_NAME: backend
      AUTOSCALER_MIN_REPLICAS: "1"
      AUTOSCALER_MAX_REPLICAS: "5"
      AUTOSCALER_SCALE_UP_THRESHOLD: "0.70"
      AUTOSCALER_SCALE_DOWN_THRESHOLD: "0.30"
      AUTOSCALER_COOLDOWN_SECONDS: "60"
      AUTOSCALER_P95_LATENCY_THRESHOLD: "1.0"
      AUTOSCALER_REQUEST_RATE_THRESHOLD: "50"
      AUTOSCALER_POLL_INTERVAL: "15"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - prometheus
      - backend

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
