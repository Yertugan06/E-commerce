global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "ecommerce-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"

  - job_name: "autoscaler"
    static_configs:
      - targets: ["autoscaler:9100"]
    metrics_path: "/metrics"

  - job_name: "metrics-generator"
    static_configs:
      - targets: ["metrics-generator:8000", "host.docker.internal:8001", "localhost:8001"]
    metrics_path: "/metrics"
