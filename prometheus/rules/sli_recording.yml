groups:
  - name: sli_backend
    interval: 5s
    rules:
      - record: sli:api_availability:ratio_5m
        expr: |
          1 - (
            (
              sum(increase(http_requests_total{job="ecommerce-backend",status_group="5xx"}[5m]))
              or vector(0)
            )
            /
            clamp_min(sum(increase(http_requests_total{job="ecommerce-backend"}[5m])), 0.0001)
          )

      - record: sli:checkout_success_rate:5m
        expr: |
          sum(increase(http_requests_total{job="ecommerce-backend",path="/checkout",status_group="2xx"}[5m]))
          /
          clamp_min(sum(increase(http_requests_total{job="ecommerce-backend",path="/checkout"}[5m])), 0.0001)

      - record: sli:cart_read_latency_p95:5m
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="ecommerce-backend",path="/cart"}[5m])) by (le)
          )

      - record: sli:order_read_latency_p95:5m
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="ecommerce-backend",path=~"/orders(/.*)?"}[5m])) by (le)
          )

      - record: sli:cart_update_latency_p95:5m
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="ecommerce-backend",path=~"/cart/items(/.*)?"}[5m])) by (le)
          )

      - record: sli:checkout_latency_p95:5m
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="ecommerce-backend",path="/checkout"}[5m])) by (le)
          )

      - record: sli:cart_consistency_rate:5m
        expr: |
          sum(increase(cart_consistency_validations_total{job="ecommerce-backend",status="success"}[5m]))
          /
          clamp_min(sum(increase(cart_consistency_validations_total{job="ecommerce-backend"}[5m])), 0.0001)
