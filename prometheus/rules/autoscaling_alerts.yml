groups:
  - name: k8s-autoscaling
    interval: 15s
    rules:
      - alert: K8sHPAMaxReplicasReached
        expr: kube_horizontalpodautoscaler_status_current_replicas{horizontalpodautoscaler="backend-hpa"} == kube_horizontalpodautoscaler_spec_max_replicas{horizontalpodautoscaler="backend-hpa"}
        for: 5m
        labels:
          severity: warning
          sli: autoscaling_capacity
        annotations:
          summary: "HPA {{ $labels.horizontalpodautoscaler }} at maximum capacity"
          description: "The HPA has reached its maximum configured replicas ({{ $value }}) for 5 minutes. The cluster may not be able to handle further load spikes."

      - alert: K8sHPAFailedToScale
        expr: kube_horizontalpodautoscaler_status_condition{condition="AbleToScale", status="false"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HPA {{ $labels.horizontalpodautoscaler }} is unable to scale"
          description: "The Kubernetes HPA controller is reporting that it cannot scale the deployment. Check cluster events and permissions."

      - alert: K8sHPAMetricsMissing
        expr: kube_horizontalpodautoscaler_status_condition{condition="ScalingActive", status="false"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HPA {{ $labels.horizontalpodautoscaler }} is missing metrics"
          description: "The HPA cannot fetch utilization metrics to make scaling decisions. Auto-scaling is effectively frozen."