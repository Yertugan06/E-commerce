groups:
  - name: autoscaling
    interval: 15s
    rules:
      - alert: BackendScaleUp
        expr: autoscaler_replicas_desired > autoscaler_replicas_current
        for: 0m
        labels:
          severity: info
          event: scale_up
        annotations:
          summary: "Auto-scaler increased backend replicas ({{ $value | humanize }} -> desired {{ $labels.desired }})"
          description: "Backend CPU or latency exceeded threshold — scaling up."

      - alert: BackendScaleDown
        expr: autoscaler_replicas_desired < autoscaler_replicas_current
        for: 0m
        labels:
          severity: info
          event: scale_down
        annotations:
          summary: "Auto-scaler decreased backend replicas ({{ $value | humanize }} -> desired {{ $labels.desired }})"
          description: "Backend CPU and latency are low — scaling down."

      - alert: MaxReplicasReached
        expr: autoscaler_replicas_current == autoscaler_replicas_max
        for: 5m
        labels:
          severity: warning
          sli: autoscaling_capacity
        annotations:
          summary: "Backend at max replicas ({{ $value | humanize }})"
          description: "The backend has been running at maximum replica count for 5 minutes. Consider increasing AUTOSCALER_MAX_REPLICAS or investigating capacity."

      - alert: ScaleDownBlocked
        expr: rate(app_process_cpu_seconds_total[5m]) < 0.1 and autoscaler_replicas_current > autoscaler_replicas_min
        for: 10m
        labels:
          severity: warning
          sli: autoscaling_efficiency
        annotations:
          summary: "CPU very low but replicas not reducing ({{ $value | humanize }})"
          description: "CPU utilization has been below 0.1 for 10 minutes but min replicas limit is holding. Consider reducing AUTOSCALER_MIN_REPLICAS."

      - alert: AutoscalerDown
        expr: up{job="autoscaler"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Autoscaler is unreachable"
          description: "The auto-scaler service has been down for over 1 minute. Auto-scaling is disabled."
