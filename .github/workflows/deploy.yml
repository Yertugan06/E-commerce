name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ecommerce-backend
  FRONTEND_IMAGE_NAME: ecommerce-frontend
  NGINX_IMAGE_NAME: ecommerce-nginx

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_run'
    runs-on: self-hosted
    # REMOVED: defaults.run.shell: bash (Let Windows use PowerShell/CMD natively)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">= 1.6"

      # Using native PowerShell string manipulation safely manages Windows paths
      - name: Lowercase repository name
        shell: powershell
        run: |
          $repo_lc = "${{ github.repository }}".ToLower()
          echo "REPOSITORY_LC=$repo_lc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Multi-line commands work flawlessly in PowerShell/CMD on Windows
      - name: Pull latest images
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          docker pull ${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          docker pull ${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/${{ env.NGINX_IMAGE_NAME }}:latest


      # Replaced 'cat <<EOF' (Linux) with a clean PowerShell Here-String
      - name: Write deploy tfvars
        shell: powershell
        run: |
          @"
          backend_image_registry_prefix    = "${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/"
          frontend_image_registry_prefix   = "${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/"
          nginx_image_registry_prefix      = "${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/"
          backend_image_tag    = "latest"
          frontend_image_tag   = "latest"
          nginx_image_tag      = "latest"
          "@ | Out-File -FilePath terraform/deploy.auto.tfvars -Encoding utf8

      - name: Terraform init
        run: terraform -chdir=terraform init -reconfigure

      - name: Terraform apply
        run: terraform -chdir=terraform apply -auto-approve