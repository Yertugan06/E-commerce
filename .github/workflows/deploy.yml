name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ecommerce-backend
  FRONTEND_IMAGE_NAME: ecommerce-frontend
  NGINX_IMAGE_NAME: ecommerce-nginx
  AUTOSCALER_IMAGE_NAME: ecommerce-autoscaler

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">= 1.6"

      - name: Lowercase repository name
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPOSITORY_LC=${REPO_LC}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          docker pull ${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          docker pull ${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/${{ env.NGINX_IMAGE_NAME }}:latest
          docker pull ${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/${{ env.AUTOSCALER_IMAGE_NAME }}:latest

      - name: Write deploy tfvars
        run: |
          cat <<EOF > terraform/deploy.auto.tfvars
          backend_image_registry_prefix    = "${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/"
          frontend_image_registry_prefix   = "${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/"
          nginx_image_registry_prefix      = "${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/"
          autoscaler_image_registry_prefix = "${{ env.REGISTRY }}/${{ env.REPOSITORY_LC }}/"
          backend_image_tag    = "latest"
          frontend_image_tag   = "latest"
          nginx_image_tag      = "latest"
          autoscaler_image_tag = "latest"
          EOF

      - name: Terraform init
        run: terraform -chdir=terraform init -reconfigure

      - name: Terraform apply
        run: terraform -chdir=terraform apply -auto-approve